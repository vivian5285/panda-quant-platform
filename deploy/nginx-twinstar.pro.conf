# TwinStar · HTTP 初始配置（ACME 验证用）

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name twinstar.pro www.twinstar.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    include /etc/nginx/snippets/twinstar-locations.conf;
}

server {
    listen 80;
    server_name 187.77.130.144;

    include /etc/nginx/snippets/twinstar-locations.conf;
}
