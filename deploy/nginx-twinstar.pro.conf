# TwinStar · 双子星AI量化 — Nginx 生产配置
# 与同机脚本共存（仅反代，不占用 5002/5003/5004 端口）:
#   5002/5003/5004 → 本机其它系统（勿改其进程与监听）
#   127.0.0.1:5003  → /binance/webhook
#   127.0.0.1:5004  → /deepcoin/webhook
#   127.0.0.1:6010  → /gemini/webhook
#   127.0.0.1:6080  → 平台前端（容器内 /api/ 已反代 backend:8000）
#
# 安装: sudo bash deploy/setup-https-twinstar.sh
# 或手动: sudo cp deploy/nginx-twinstar.pro.conf /etc/nginx/sites-available/twinstar.pro
#         sudo ln -sf /etc/nginx/sites-available/twinstar.pro /etc/nginx/sites-enabled/
#         sudo nginx -t && sudo systemctl reload nginx

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── 域名入口（Certbot 会在此 server 上自动追加 443 + 80→443 跳转）──
server {
    listen 80;
    listen [::]:80;
    server_name twinstar.pro www.twinstar.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    include /etc/nginx/snippets/twinstar-locations.conf;
}

# ── 公网 IP 入口（保留 HTTP，不影响已有 TV Webhook URL）──
server {
    listen 80;
    listen [::]:80;
    server_name 187.77.130.144;

    include /etc/nginx/snippets/twinstar-locations.conf;
}
