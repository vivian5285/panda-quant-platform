# TwinStar · HTTPS 生产配置（需已有证书: /etc/letsencrypt/live/DOMAIN/）
# 由 setup-https-twinstar.sh 在 certbot certonly 成功后部署

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTPS 域名 ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name twinstar.pro www.twinstar.pro;

    ssl_certificate /etc/letsencrypt/live/twinstar.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/twinstar.pro/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    include /etc/nginx/snippets/twinstar-locations.conf;
}

# ── 域名 HTTP → HTTPS 跳转 ──
server {
    listen 80;
    listen [::]:80;
    server_name twinstar.pro www.twinstar.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── 公网 IP 保留 HTTP（币安/深币 TV Webhook 不受影响）──
server {
    listen 80;
    listen [::]:80;
    server_name 187.77.130.144;

    include /etc/nginx/snippets/twinstar-locations.conf;
}
