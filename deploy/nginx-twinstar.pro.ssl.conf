# TwinStar · HTTPS 生产配置（需已有证书: /etc/letsencrypt/live/DOMAIN/）
# 注意: 仅 IPv4 listen，避免 VPS 未启用 IPv6 时 443 整块 server 无法绑定

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTPS 域名（仅 0.0.0.0:443）──
server {
    listen 443 ssl;
    server_name twinstar.pro www.twinstar.pro;

    ssl_certificate /etc/letsencrypt/live/twinstar.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/twinstar.pro/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    include /etc/nginx/snippets/twinstar-locations.conf;
}

# ── 域名 HTTP → HTTPS 跳转 ──
server {
    listen 80;
    server_name twinstar.pro www.twinstar.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── 公网 IP 保留 HTTP（币安/深币 TV Webhook 不受影响）──
server {
    listen 80;
    server_name 187.77.130.144;

    include /etc/nginx/snippets/twinstar-locations.conf;
}
