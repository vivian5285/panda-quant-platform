# TwinStar · 仅域名 HTTPS（与币安/深币现有 Nginx 共存）
# 只处理 twinstar.pro / www.twinstar.pro，不碰 server_name IP 与其它 conf 文件
# 币安/深币 TV Webhook 继续走原有配置: http://187.77.130.144/binance/webhook 等

server {
    listen 443 ssl;
    server_name twinstar.pro www.twinstar.pro;

    ssl_certificate /etc/letsencrypt/live/twinstar.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/twinstar.pro/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    location /gemini/webhook {
        proxy_pass http://127.0.0.1:6010/webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        client_max_body_size 64k;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://127.0.0.1:6080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Access-Token $http_x_access_token;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 30s;
        proxy_read_timeout 3600s;
    }
}

server {
    listen 80;
    server_name twinstar.pro www.twinstar.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
