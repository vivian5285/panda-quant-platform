# 被 nginx-twinstar.pro.conf include；Certbot 不会修改此文件
# 安装脚本复制到 /etc/nginx/snippets/twinstar-locations.conf

# 币安单账户（127.0.0.1:5003 — 独立服务，与 Gemini 6010 互不影响）
location /binance/webhook {
    proxy_pass http://127.0.0.1:5003/webhook;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 3s;
    proxy_read_timeout 10s;
}

# 深币（127.0.0.1:5004 — 独立服务，与 Gemini 6010 互不影响）
location /deepcoin/webhook {
    proxy_pass http://127.0.0.1:5004/webhook;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 3s;
    proxy_read_timeout 10s;
}

# TwinStar 平台 TradingView Webhook（6010，与 5002/5003/5004 无关）
location /gemini/webhook {
    proxy_pass http://127.0.0.1:6010/webhook;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    client_max_body_size 64k;
    proxy_buffering off;
}

# 平台网页 + API（6080；/api/ 由前端容器 nginx 反代到 backend:8000）
location / {
    proxy_pass http://127.0.0.1:6080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Access-Token $http_x_access_token;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_connect_timeout 30s;
    proxy_read_timeout 3600s;
}
